<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ff719a" />
<meta name="description" content="ABC & 123 Fun — a colorful, talking, interactive learning app for little kids." />
<title>ABC & 123 Fun!</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="bars">
    <nav class="topbar" id="deckBar" aria-label="Categories"></nav>
    <div class="toolbar">
      <button class="tool" id="autoBtn">▶️ Auto</button>
      <button class="tool" id="quizBtn">❓ Quiz</button>
      <button class="tool" id="traceBtn">✏️ Trace</button>
      <button class="tool" id="matchBtn">🧩 Match</button>
      <button class="tool" id="songBtn">🎶 Song</button>
      <button class="tool toggle" id="caseBtn" aria-label="Letter case">Aa</button>
      <button class="tool toggle" id="soundBtn">🔊 Sound</button>
      <button class="tool toggle" id="musicBtn">🎵 Music</button>
      <button class="tool toggle" id="fsBtn" aria-label="Fullscreen">⛶</button>
      <label class="speed" aria-label="Auto speed">🐢
        <input type="range" id="speed" min="3000" max="8000" step="1000" value="5000" />
      🐇</label>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="card" id="card"></div>
  </main>

  <div class="progress" id="progress" aria-hidden="true"></div>

  <nav class="nav" aria-label="Card controls">
    <button class="navbtn" id="prevBtn" aria-label="Previous">⬅️</button>
    <button class="navbtn say" id="sayBtn" aria-label="Say it">🔊</button>
    <button class="navbtn" id="nextBtn" aria-label="Next">➡️</button>
  </nav>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script type="module" src="js/app.js"></script>
</body>
</html>
